<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Your Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
}

/* Overlay för musik */
#overlay {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: rgba(0,0,0,0.85);
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:2rem;
  cursor:pointer;
  transition: opacity 0.8s ease;
  z-index:1000;
}
#overlay.hidden {
  opacity:0;
  pointer-events:none;
}

.container {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding:30px;
  width:400px;
  text-align:center;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
  color:#fff;
  position:relative;
  z-index:1;
}

input, textarea, select {
  width:90%;
  margin:10px 0;
  padding:8px;
  border-radius:8px;
  border:none;
  font-size:1em;
}

button {
  padding:10px 20px;
  background:#ff4d4d;
  border:none;
  border-radius:10px;
  color:#fff;
  font-size:1em;
  cursor:pointer;
  margin:5px;
}
button:hover { background:#ff1a1a; }

#output { width:100%; height:350px; margin-top:15px; }

.avatar-preview {
  width:100px; height:100px;
  border-radius:50%;
  margin:10px auto;
  object-fit:cover;
  border:3px solid #fff;
  display:block;
}

/* Volymkontroll */
#volumeControl {
  margin:10px 0;
}
</style>
</head>
<body>

<!-- Overlay och musik -->
<div id="overlay">Click to enter ▶</div>
<audio id="bgAudio" loop>
  <source src="https://raw.githubusercontent.com/bambuuswe/my-bio/main/music.mp3" type="audio/mpeg">
</audio>
<div id="volumeControl">
  🔊
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<div class="container">
  <h1>Create Your Bio</h1>
  
  <input id="name" placeholder="Name"><br>
  <input type="color" id="nameColor" value="#00ffff"> Choose Name Color<br>
  
  <input id="title" placeholder="Title"><br>
  <input type="color" id="titleColor" value="#cccccc"> Choose Title Color<br>
  
  <textarea id="bio" placeholder="Bio"></textarea><br>
  <input type="color" id="bioColor" value="#ffffff"> Choose Bio Color<br>

  <!-- Hyperlinks med display-namn -->
  <input id="link1Text" placeholder="Link 1 Text"><br>
  <input id="link1" placeholder="Link 1 URL"><br>

  <input id="link2Text" placeholder="Link 2 Text (optional)"><br>
  <input id="link2" placeholder="Link 2 URL (optional)"><br>

  <input id="link3Text" placeholder="Link 3 Text (optional)"><br>
  <input id="link3" placeholder="Link 3 URL (optional)"><br>

  <input type="file" id="avatarUpload" accept="image/*"><br>
  <img id="avatarPreview" class="avatar-preview" src="" alt="Avatar Preview"><br>
  
  <select id="backgroundChoice">
    <option value="gradient">Gradient Background</option>
    <option value="image">Upload Background Image</option>
  </select><br>
  <input type="file" id="bgUpload" accept="image/*"><br>
  
  <button onclick="generateHTML()">Generate HTML</button>
  <button onclick="downloadHTML()">Download Profile</button>
  <h2>Generated HTML:</h2>
  <textarea id="output"></textarea>
</div>

<script>
// Musik och overlay
const overlay = document.getElementById("overlay");
const audio = document.getElementById("bgAudio");
const volumeSlider = document.getElementById("volumeSlider");

audio.volume = volumeSlider.value;

overlay.addEventListener("click", () => {
  audio.play().then(() => console.log("Musik spelas!"))
       .catch(err => console.error("Audio kunde inte spelas:", err));
  overlay.classList.add("hidden");
  setTimeout(() => { overlay.style.display="none"; }, 800);
});

volumeSlider.addEventListener("input", () => {
  audio.volume = volumeSlider.value;
  console.log("Volym ändrad till:", volumeSlider.value);
});

// Avatar & bakgrund
const avatarInput = document.getElementById("avatarUpload");
const avatarPreview = document.getElementById("avatarPreview");
const bgUpload = document.getElementById("bgUpload");
let bgImage = "";

avatarInput.addEventListener("change", () => {
  const file = avatarInput.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e => avatarPreview.src = e.target.result;
    reader.readAsDataURL(file);
  }
});

bgUpload.addEventListener("change", () => {
  const file = bgUpload.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e => bgImage = e.target.result;
    reader.readAsDataURL(file);
  }
});

// Generera HTML
function generateHTML(){
  const name = document.getElementById("name").value;
  const nameColor = document.getElementById("nameColor").value;
  const title = document.getElementById("title").value;
  const titleColor = document.getElementById("titleColor").value;
  const bio = document.getElementById("bio").value;
  const bioColor = document.getElementById("bioColor").value;

  const linkTexts = [
    document.getElementById("link1Text").value,
    document.getElementById("link2Text").value,
    document.getElementById("link3Text").value
  ];

  const linkURLs = [
    document.getElementById("link1").value,
    document.getElementById("link2").value,
    document.getElementById("link3").value
  ];

  let linksHTML = "";
  for(let i=0;i<3;i++){
    if(linkTexts[i] && linkURLs[i]){
      linksHTML += `<a href="${linkURLs[i]}" target="_blank">${linkTexts[i]}</a>\n`;
    }
  }

  const avatar = avatarPreview.src;
  const bgChoice = document.getElementById("backgroundChoice").value;
  let bgCSS = bgChoice === "gradient" ? 
      "background: linear-gradient(135deg, #6a11cb, #2575fc);" : 
      `background: url('${bgImage}') no-repeat center center / cover;`;

  const html = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${name}'s Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; ${bgCSS} color:#fff; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
.bio-card { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 20px; padding:30px; max-width:400px; text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.5); }
.avatar { width:100px; height:100px; border-radius:50%; margin:10px auto; object-fit:cover; border:3px solid #fff; display:block; }
h1 { margin:10px 0 5px; font-size:1.8em; color:${nameColor}; text-shadow:0 0 10px ${nameColor},0 0 20px ${nameColor}; }
h3 { margin:5px 0 15px; font-weight:400; color:${titleColor}; }
p { font-size:1em; margin-bottom:15px; color:${bioColor}; }
a { display:inline-block; padding:10px 20px; background:#ff4d4d; color:#fff; border-radius:10px; text-decoration:none; transition:0.3s; margin:5px; }
a:hover { background:#ff1a1a; }
</style>
</head>
<body>
<div class="bio-card">
<img src="${avatar}" class="avatar" alt="Avatar">
<h1>${name}</h1>
<h3>${title}</h3>
<p>${bio}</p>
${linksHTML}
</div>
</body>
</html>
  `.trim();

  document.getElementById("output").value = html;
}

// Ladda ner HTML
function downloadHTML(){
  const blob = new Blob([document.getElementById("output").value], {type:"text/html"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "index.html";
  link.click();
}
</script>
</body>
</html>
