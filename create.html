    body {

      color: #fff;
      display: flex;

      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

      background: rgba(0,0,0,0.6);

      border-radius: 20px;
      padding: 30px;
      width: 400px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input, textarea {
      width: 90%;
      margin: 10px 0;
      padding: 8px;
      border-radius: 8px;
      border: none;
      font-size: 1em;
    }

    button {
      padding: 10px 20px;
      background: #ff4d4d;

      border-radius: 10px;

    #output {

      margin-top: 15px;

    .avatar-preview {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 10px auto;
      object-fit: cover;
      border: 3px solid #fff;
      display: block;
    }
  </style>
</head>

  </div>
