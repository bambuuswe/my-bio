<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Create Your Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #6a11cb, #2575fc); color: #fff; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
.container { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 20px; padding:30px; width:400px; text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.5); }
input, textarea { width:90%; margin:10px 0; padding:8px; border-radius:8px; border:none; font-size:1em; }
button { padding:10px 20px; background:#ff4d4d; border:none; border-radius:10px; color:#fff; font-size:1em; cursor:pointer; margin:5px; }
button:hover { background:#ff1a1a; }
#output { width:100%; height:200px; margin-top:15px; }
.avatar-preview { width:100px; height:100px; border-radius:50%; margin:10px auto; object-fit:cover; border:3px solid #fff; display:block; }
</style>
</head>
<body>
<div class="container">
  <h1>Create Your Bio</h1>
  <input id="name" placeholder="Name"><br>
  <input id="title" placeholder="Title"><br>
  <textarea id="bio" placeholder="Bio"></textarea><br>
  <input id="link1" placeholder="Link 1 (full URL)"><br>
  <input id="link2" placeholder="Link 2 (optional)"><br>
  <input id="link3" placeholder="Link 3 (optional)"><br>
  <input type="file" id="avatarUpload" accept="image/*"><br>
  <img id="avatarPreview" class="avatar-preview" src="" alt="Avatar Preview"><br>
  <button onclick="generateHTML()">Generate HTML</button>
  <button onclick="downloadHTML()">Download Profile</button>
  <h2>Generated HTML:</h2>
  <textarea id="output"></textarea>
</div>

<script>
const avatarInput = document.getElementById("avatarUpload");
const avatarPreview = document.getElementById("avatarPreview");

avatarInput.addEventListener("change", () => {
  const file = avatarInput.files[0];
  if(file){
    const reader = new FileReader();
    reader.onload = e => avatarPreview.src = e.target.result;
    reader.readAsDataURL(file);
  }
});

function generateHTML(){
  const name = document.getElementById("name").value;
  const title = document.getElementById("title").value;
  const bio = document.getElementById("bio").value;
  const links = [
    document.getElementById("link1").value,
    document.getElementById("link2").value,
    document.getElementById("link3").value
  ].filter(l => l); // Ta bort tomma länkar
  const avatar = avatarPreview.src;

  let linksHTML = "";
  links.forEach(l => {
    linksHTML += `<a href="${l}" target="_blank">${l}</a>\n`;
  });

  const html = `
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>${name}'s Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Poppins', sans-serif; background: linear-gradient(135deg, #6a11cb, #2575fc); color: #fff; display:flex; justify-content:center; align-items:center; min-height:100vh; margin:0; }
.bio-card { background: rgba(0,0,0,0.6); backdrop-filter: blur(10px); border-radius: 20px; padding:30px; max-width:400px; text-align:center; box-shadow:0 0 20px rgba(0,0,0,0.5); }
.avatar { width:100px; height:100px; border-radius:50%; margin:10px auto; object-fit:cover; border:3px solid #fff; display:block; }
h1 { margin:10px 0 5px; font-size:1.8em; color:#00ffff; text-shadow:0 0 10px #00ffff, 0 0 20px #00ffff; }
h3 { margin:5px 0 15px; font-weight:400; color:#ccc; }
p { font-size:1em; margin-bottom:15px; }
a { display:inline-block; padding:10px 20px; background:#ff4d4d; color:#fff; border-radius:10px; text-decoration:none; transition:0.3s; margin:5px; }
a:hover { background:#ff1a1a; }
</style>
</head>
<body>
<div class="bio-card">
<img src="${avatar}" class="avatar" alt="Avatar">
<h1>${name}</h1>
<h3>${title}</h3>
<p>${bio}</p>
${linksHTML}
</div>
</body>
</html>
  `.trim();

  document.getElementById("output").value = html;
}

function downloadHTML(){
  const blob = new Blob([document.getElementById("output").value], {type:"text/html"});
  const link = document.createElement("a");
  link.href = URL.createObjectURL(blob);
  link.download = "profile.html";
  link.click();
}
</script>
</body>
</html>
