<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝕭𝖆𝖒𝖇𝖚𝖚's Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
/* CUSTOM CURSOR */
* {
  cursor: url("cursor.png") 16 16, auto;
}

body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('background4.jpg') no-repeat center center / cover;
}

/* Overlay */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  cursor: pointer;
  transition: opacity 0.8s ease;
  z-index: 1000;
}
#overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

/* Bio-card */
.bio-card {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
}
.bio-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}

/* Avatar */
.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin: 10px auto;
  object-fit: cover;
  border: 3px solid #fff;
  display: block;
}

/* Text */
h1 {
  margin: 10px 0 5px;
  font-size: 1.9em;
  color: #ff0000;
  text-shadow: 0 0 10px red, 0 0 20px red;
}
h3 { color: #ccc; font-weight: 400; }
p { color: #fff; font-size: 0.95em; }

/* Links */
a {
  display: inline-block;
  padding: 10px 20px;
  background: #ff4d4d;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  margin: 5px;
  transition: transform 0.2s, background 0.2s;
}
a:hover {
  transform: scale(1.1);
  background: #ff1a1a;
}

/* Currently Playing */
.currently-playing {
  margin-top: 15px;
  color: #ff0000;
  font-weight: bold;
}

/* Volume */
#volumeControl {
  position: fixed;
  bottom: 20px;
  right: 20px;
  color: #fff;
  z-index: 1001;
}
</style>
</head>

<body>

<!-- Overlay -->
<div id="overlay">Click to enter ▶</div>

<!-- Audio -->
<audio id="bgAudio" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="clickSound">
  <source src="click.mp3" type="audio/mpeg">
</audio>

<!-- Bio Card -->
<div class="bio-card">
  <img src="avatar.png" class="avatar">
  <h1>Bambuu</h1>
  <h3>Gamer & YouTuber</h3>
  <p>
    I'm a small YouTuber who loves gaming, vibes, and building cool stuff.
    Always leveling up 🎮🔥
  </p>

  <a href="https://youtube.com/@bambuuspelar" target="_blank">YouTube</a>
  <a href="https://discord.com/users/1032996748798480525" target="_blank">Discord</a>

  <div class="currently-playing">
    🎮 Currently Playing: Roblox
  </div>
</div>

<!-- Volume -->
<div id="volumeControl">
  🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<script>
const overlay = document.getElementById("overlay");
const bgAudio = document.getElementById("bgAudio");
const clickSound = document.getElementById("clickSound");
const volumeSlider = document.getElementById("volumeSlider");

// Start audio
overlay.addEventListener("click", () => {
  bgAudio.volume = volumeSlider.value;
  bgAudio.play().catch(() => {});
  overlay.classList.add("hidden");
  setTimeout(() => overlay.remove(), 800);
});

// Volume
volumeSlider.addEventListener("input", () => {
  bgAudio.volume = volumeSlider.value;
});

// Click sound (global)
document.addEventListener("click", () => {
  clickSound.currentTime = 0;
  clickSound.play().catch(() => {});
});
</script>

</body>
</html>
