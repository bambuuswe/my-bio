<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝕭𝖆𝖒𝖇𝖚𝖚's Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('background4.jpg') no-repeat center center / cover;
}

/* Overlay */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  cursor: pointer;
  transition: opacity 0.8s ease;
  z-index: 1000;
}
#overlay.hidden { opacity: 0; pointer-events: none; }

/* Bio-card */
.bio-card {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
}
.bio-card:hover {
  transform: translateY(-10px) scale(1.02);
}

/* Avatar */
.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin: 10px auto;
  border: 3px solid #fff;
}

/* Text */
h1 { color: #DE0000; text-shadow: 0 0 10px #DE0000; }
h3 { color: #ccc; }
p { color: #fff; }

/* Links */
a {
  padding: 10px 20px;
  background: #ff4d4d;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  margin: 5px;
}
a:hover { background: #ff1a1a; }

/* Currently Playing */
.currently-playing {
  margin-top: 15px;
  font-weight: bold;
  color: #FF0000;
}

/* Game icons */
.game-icons {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
}
.game-icons img {
  width: 50px;
  height: 50px;
  border-radius: 10px;
  transition: 0.25s;
}
.game-icons img.highlight {
  transform: scale(1.2);
  box-shadow: 0 0 20px #FF0000;
}

/* Floating menu button */
#gameMenuBtn {
  position: fixed;
  bottom: 20px;
  right: 20px;
  width: 55px;
  height: 55px;
  border-radius: 50%;
  background: #ff4d4d;
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 1.5em;
  cursor: pointer;
  z-index: 2000;
}

/* Menu */
#gameMenu {
  position: fixed;
  bottom: 85px;
  right: 20px;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(10px);
  padding: 10px;
  border-radius: 15px;
  display: none;
  flex-direction: column;
  gap: 8px;
  z-index: 2000;
}
#gameMenu button {
  background: #ff4d4d;
  border: none;
  color: #fff;
  padding: 8px;
  border-radius: 10px;
  cursor: pointer;
}
#gameMenu button:hover { background: #ff1a1a; }

/* Volume */
#volumeControl {
  position: fixed;
  bottom: 20px;
  left: 20px;
  color: #fff;
  z-index: 1001;
}
</style>
</head>
<body>

<div id="overlay">Click to enter ▶</div>

<audio id="bgAudio" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="bio-card">
  <img src="avatar.png" class="avatar">
  <h1>Bambuu</h1>
  <h3>Gamer & YouTuber</h3>
  <p>Hey there! I'm a small YouTuber who loves gaming.</p>

  <a href="https://youtube.com/@bambuuspelar" target="_blank">YouTube</a>
  <a href="https://discord.com/users/1032996748798480525" target="_blank">Discord</a>

  <div class="currently-playing">
    🎮 Currently Playing: <span id="gameText">Nothing</span>
  </div>

  <div class="game-icons">
    <img src="roblox1.jpg" data-game="Roblox">
    <img src="r6.jpg" data-game="R6 Siege">
    <img src="minecraft1.jpg" data-game="Minecraft">
    <img src="ets21.jpg" data-game="ETS2">
  </div>
</div>

<!-- Menu -->
<div id="gameMenuBtn">🎮</div>
<div id="gameMenu">
  <button onclick="setGame('Roblox')">Roblox</button>
  <button onclick="setGame('R6 Siege')">R6 Siege</button>
  <button onclick="setGame('Minecraft')">Minecraft</button>
  <button onclick="setGame('ETS2')">ETS2</button>
</div>

<div id="volumeControl">
  🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<script>
const overlay = document.getElementById("overlay");
const audio = document.getElementById("bgAudio");
const volumeSlider = document.getElementById("volumeSlider");
const gameText = document.getElementById("gameText");
const gameIcons = document.querySelectorAll(".game-icons img");
const menuBtn = document.getElementById("gameMenuBtn");
const menu = document.getElementById("gameMenu");

audio.volume = volumeSlider.value;

overlay.onclick = () => {
  audio.play();
  overlay.classList.add("hidden");
};

volumeSlider.oninput = () => audio.volume = volumeSlider.value;

menuBtn.onclick = () => {
  menu.style.display = menu.style.display === "flex" ? "none" : "flex";
};

function setGame(game) {
  gameText.textContent = game;
  gameIcons.forEach(img =>
    img.classList.toggle("highlight", img.dataset.game === game)
  );
  menu.style.display = "none";
}
</script>
</body>
</html>
