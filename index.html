<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝕭𝖆𝖒𝖇𝖚𝖚's Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('background.jpg') no-repeat center center / cover;
}

.bio-card {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
  perspective: 1000px;
}

.bio-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}

.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin: 10px auto;
  object-fit: cover;
  border: 3px solid #fff;
  display: block;
  transition: transform 0.3s;
}

.avatar:hover {
  transform: scale(1.1) rotate(5deg);
}

h1 { margin: 10px 0 5px; font-size: 1.8em; color: #00ffff; text-shadow: 0 0 10px #00ffff, 0 0 20px #00ffff; }
h3 { margin: 5px 0 15px; font-weight: 400; color: #cccccc; }
p { font-size: 1em; margin-bottom: 15px; color: #fff; }

a {
  display: inline-block;
  padding: 10px 20px;
  background: #ff4d4d;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  transition: transform 0.2s, background 0.2s;
  margin: 5px;
}

a:hover {
  transform: scale(1.1);
  background: #ff1a1a;
}
</style>
</head>
<body>
<div class="bio-card">
  <img src="avatar.png" class="avatar" alt="Avatar">
  <h1>Bambuu</h1>
  <h3>Web Creator</h3>
  <p>This is my bio!</p>
  <a href="https://youtube.com" target="_blank">YouTube</a>
  <a href="https://github.com" target="_blank">GitHub</a>
</div>
</body>
</html>
