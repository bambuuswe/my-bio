<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Bambuu's Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    margin: 0;
  }
  .bio-card {
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 30px;
    max-width: 400px;
    text-align: center;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  .avatar {
    width: 100px;
    height: 100px;
    border-radius: 50%;
    margin: 10px auto;
    object-fit: cover;
    border: 3px solid #fff;
    display: block;
  }
  h1 { margin: 10px 0 5px; font-size: 1.8em; }
  h3 { margin: 5px 0 15px; font-weight: 400; color: #ccc; }
  p { font-size: 1em; margin-bottom: 15px; }
  a {
    display: inline-block;
    padding: 10px 20px;
    background: #ff4d4d;
    color: #fff;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
  }
  a:hover { background: #ff1a1a; }
</style>
</head>
<body>
  <div class="bio-card">
    <img src="avatar.png" alt="Avatar" class="avatar">
    <h1>Bambuu</h1>
    <h3>Youtuber & Gamer</h3>
    <p>Hello! I'm Bambuu and i like to create content!</p>
    <a href="https://youtube.com/@bambuuspelar" target="_blank">My YouTube</a>
  </div>
</body>
</html>
