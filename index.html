¨<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>𝕭𝖆𝖒𝖇𝖚𝖚</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #ff0000;
  --red-glow: rgba(255, 0, 0, 0.6);
  --card-bg: rgba(5, 5, 10, 0.4);
  --glass-border: rgba(255, 255, 255, 0.1);
}

* { box-sizing: border-box; margin: 0; padding: 0; cursor: none !important; }

body {
  width: 100%; min-height: 100vh;
  font-family: 'Space Grotesk', sans-serif;
  background: #000;
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  perspective: 1200px;
}

/* BAKGRUND */
.bg-wrapper {
  position: fixed; inset: 0; z-index: -1;
  background: url('background4.jpg') center/cover no-repeat;
  filter: brightness(0.25) contrast(1.2);
}

.scanlines {
  position: fixed; inset: 0; z-index: 1;
  background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,0.05) 50%);
  background-size: 100% 4px;
  pointer-events: none;
}

/* START-SKÄRM */
#init-overlay {
  position: fixed; inset: 0; z-index: 10000;
  background: #000;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  transition: opacity 0.8s ease, visibility 0.8s;
}

.init-btn {
  background: transparent; border: 1px solid var(--red); color: var(--red);
  padding: 20px 60px; font-family: 'Rajdhani'; font-weight: 700; font-size: 1.5rem;
  letter-spacing: 12px; transition: 0.5s; text-transform: uppercase;
}
.init-btn:hover { background: var(--red); color: #fff; box-shadow: 0 0 50px var(--red); }

/* DASHBOARD */
.container {
  display: flex; flex-direction: column; gap: 20px;
  width: 95%; max-width: 800px;
  z-index: 10; opacity: 0; transform: scale(0.95);
  transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
  transform-style: preserve-3d;
}
.container.active { opacity: 1; transform: scale(1); }

.row-top { display: grid; grid-template-columns: 1.2fr 0.8fr; gap: 20px; transform-style: preserve-3d; }

.card {
  background: var(--card-bg);
  backdrop-filter: blur(20px);
  border: 1px solid var(--glass-border);
  border-radius: 24px;
  padding: 35px;
  position: relative;
  transition: border 0.3s, box-shadow 0.3s;
  transform-style: preserve-3d;
}

/* MUSIK-KORT (UTAN 3D-ROTATION) */
.music-card { 
    display: flex; 
    align-items: center; 
    gap: 30px; 
    padding: 25px 45px; 
    transform: none !important; /* Tvingar kortet att vara statiskt */
}

#playBtn {
  width: 55px; height: 55px; border-radius: 50%; border: none; background: #fff;
  color: #000; font-size: 1.4rem; transition: 0.3s; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
}
#playBtn:hover { background: var(--red); color: #fff; transform: scale(1.1); box-shadow: 0 0 20px var(--red); }

.vol-box { flex: 1; display: flex; flex-direction: column; gap: 8px; }
input[type=range] { accent-color: var(--red); height: 5px; width: 100%; cursor: none !important; }

/* PROFIL & DISCORD (MED 3D) */
.avatar-wrap { width: 85px; height: 85px; border-radius: 50%; border: 2px solid var(--red); padding: 4px; margin-bottom: 20px; transform: translateZ(30px); }
.avatar-img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }
h1 { font-family: 'Rajdhani'; font-size: 2.8rem; color: var(--red); transform: translateZ(40px); }

.link-btn {
  background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
  color: #fff; padding: 14px; border-radius: 12px; text-decoration: none;
  font-family: 'Rajdhani'; font-weight: 700; text-align: center; display: block; margin-bottom: 5px; transform: translateZ(20px);
}
.link-btn:hover { background: var(--red); transform: translateZ(40px); }

.activity-card { display: flex; align-items: center; gap: 30px; transform-style: preserve-3d; }
.game-icon { width: 110px; height: 110px; border-radius: 20px; border: 1px solid var(--red); object-fit: cover; transform: translateZ(20px); }

/* CURSOR & TRACKER */
#cursor {
  position: fixed; width: 20px; height: 20px; border: 2px solid #fff;
  border-radius: 50%; pointer-events: none; z-index: 20000;
  transform: translate(-50%, -50%);
}
.view-tracker {
    position: fixed; bottom: 30px; left: 30px; z-index: 1000;
    background: rgba(0,0,0,0.6); padding: 12px 20px; border-radius: 50px;
    border: 1px solid var(--glass-border); font-family: 'Rajdhani';
}

@keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
</style>
</head>
<body>

<div id="init-overlay">
  <button class="init-btn" onclick="launch()">Initialize System</button>
</div>

<div class="bg-wrapper"></div>
<div class="scanlines"></div>
<div id="cursor"></div>

<audio id="audio" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="view-tracker">
    <span style="color:var(--red)">👁</span> <span id="v-count">0000</span>
</div>

<div class="container" id="dashboard">
  
  <div class="row-top">
    <div class="card anim-card">
      <div class="avatar-wrap"><img src="avatar.png" class="avatar-img"></div>
      <h1>BAMBUU</h1>
      <p style="margin-top:15px; color:#ccc; border-left:2px solid var(--red); padding-left:15px;">Gamer and Youtuber</p>
    </div>

    <div class="card anim-card links-card">
      <a href="https://youtube.com/@bambuuspelar" target="_blank" class="link-btn">YOUTUBE</a>
      <a href="https://discord.com/users/1032996748798480525" target="_blank" class="link-btn">DISCORD</a>
      <a href="https://steamcommunity.com/id/pellehall/" target= class="link-btn">STEAM</a>
    </div>
  </div>

  <div class="card anim-card activity-card">
    <img src="avatar.png" id="g-img" class="game-icon">
    <div class="act-info">
      <div style="color:var(--red); font-weight:700; font-size:0.7rem; letter-spacing:2px; margin-bottom:5px;">LIVE_ACTIVITY</div>
      <h2 id="g-name" style="font-family:'Rajdhani'; font-size:1.8rem;">Loading...</h2>
      <p id="g-det" style="color:#888;">Awaiting Discord signal</p>
    </div>
  </div>

  <div class="card music-card">
    <button id="playBtn">▶</button>
    <div class="vol-box">
        <div style="display:flex; justify-content:space-between; font-family:'Rajdhani'; font-size:0.7rem; color:var(--red);">
            <span>AUDIO_OUTPUT</span>
            <span id="vol-perc">10%</span>
        </div>
        <input type="range" id="vol" min="0" max="1" step="0.01" value="0.10">
    </div>
  </div>

</div>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const volSlider = document.getElementById('vol');
const volPerc = document.getElementById('vol-perc');
const dashboard = document.getElementById('dashboard');
const cursor = document.getElementById('cursor');

audio.volume = 0.10;

function launch() {
  audio.play();
  playBtn.innerText = '⏸';
  document.getElementById('init-overlay').style.opacity = '0';
  setTimeout(() => {
    document.getElementById('init-overlay').style.display = 'none';
    dashboard.classList.add('active');
  }, 800);
}

// MUSIC LOGIC
playBtn.onclick = (e) => {
  e.stopPropagation();
  if (audio.paused) { audio.play(); playBtn.innerText = '⏸'; }
  else { audio.pause(); playBtn.innerText = '▶'; }
};

volSlider.oninput = (e) => {
  audio.volume = e.target.value;
  volPerc.innerText = Math.round(e.target.value * 100) + "%";
};

// 3D ANIMATION (Gäller endast element med klassen .anim-card)
let mX = window.innerWidth/2, mY = window.innerHeight/2;
let cX = mX, cY = mY;

document.addEventListener('mousemove', (e) => {
  mX = e.clientX; mY = e.clientY;
  cursor.style.left = mX + 'px';
  cursor.style.top = mY + 'px';
});

function animate() {
  cX += (mX - cX) * 0.08;
  cY += (mY - cY) * 0.08;
  const rY = (cX - window.innerWidth / 2) / 35;
  const rX = -(cY - window.innerHeight / 2) / 25;

  // VIKTIGT: Vi animerar bara profil, länkar och discord - inte musiken!
  document.querySelectorAll('.anim-card').forEach(card => {
    card.style.transform = `rotateX(${rX}deg) rotateY(${rY}deg)`;
  });
  requestAnimationFrame(animate);
}
animate();

// DISCORD LANYARD
async function fetchDiscord() {
  try {
    const res = await fetch(`https://api.lanyard.rest/v1/users/1032996748798480525`);
    const { data } = await res.json();
    const activity = data.activities.find(a => a.type === 0);
    if (activity) {
      document.getElementById('g-name').textContent = activity.name;
      document.getElementById('g-det').textContent = activity.details || "In-game";
      if (activity.assets && activity.assets.large_image) {
          document.getElementById('g-img').src = activity.assets.large_image.startsWith("mp:external") 
          ? activity.assets.large_image.replace(/mp:external\/.*\/https\//, 'https://')
          : `https://cdn.discordapp.com/app-assets/${activity.application_id}/${activity.assets.large_image}.png`;
      }
    }
  } catch (e) {}
}
setInterval(fetchDiscord, 10000);
fetchDiscord();

// VIEWS
async function updateViews() {
    try {
        const res = await fetch(`https://api.counterapi.dev/v1/bambuu-final-os/visits/up`);
        const data = await res.json();
        document.getElementById('v-count').innerText = data.count.toString().padStart(4, '0');
    } catch (e) { document.getElementById('v-count').innerText = "0001"; }
}
updateViews();
</script>

</body>
</html>
