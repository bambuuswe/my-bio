<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝕭𝖆𝖒𝖇𝖚𝖚's Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
html, body {
  margin: 0;
  width: 100%;
  height: 100%;
}

body {
  font-family: 'Poppins', sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url("background1.jpg") no-repeat center center / cover;
}

/* OVERLAY */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  cursor: pointer;
  transition: opacity 0.8s ease;
  z-index: 1000;
}

#overlay.hidden {
  opacity: 0;
  pointer-events: none;
}

/* BIO CARD */
.bio-card {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
}

.bio-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}

/* AVATAR */
.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin: 10px auto;
  object-fit: cover;
  border: 3px solid #fff;
  transition: transform 0.3s;
}

.avatar:hover {
  transform: scale(1.1) rotate(5deg);
}

/* TEXT */
h1 {
  margin: 10px 0 5px;
  font-size: 1.8em;
  color: #DE0000;
  text-shadow: 0 0 10px #DE0000, 0 0 20px #DE0000;
}

h3 {
  margin: 5px 0 15px;
  font-weight: 400;
  color: #ccc;
}

p {
  font-size: 1em;
  margin-bottom: 15px;
  color: #fff;
}

/* LINKS */
a {
  display: inline-block;
  padding: 10px 20px;
  background: #ff4d4d;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  margin: 5px;
  transition: transform 0.2s, background 0.2s;
}

a:hover {
  transform: scale(1.1);
  background: #ff1a1a;
}

/* CURRENTLY PLAYING */
.currently-playing {
  margin-top: 15px;
  font-size: 1.1em;
  font-weight: 600;
  color: #00ffff;
  text-shadow: 0 0 8px #00ffff;
}

.currently-playing .label {
  display: block;
  font-size: 0.9em;
  color: #ccc;
  text-shadow: none;
}

#gameText {
  transition: opacity 0.4s ease;
}

/* VOLUME */
#volumeControl {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  padding: 8px 12px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  color: #fff;
  z-index: 1001;
}
</style>
</head>

<body>

<!-- OVERLAY -->
<div id="overlay">Click to enter ▶</div>

<!-- AUDIO -->
<audio id="bgAudio" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- BIO CARD -->
<div class="bio-card">
  <img src="avatar.png" class="avatar" alt="Avatar">
  <h1>Bambuu</h1>
  <h3>Gamer & YouTuber</h3>

  <p>
    I'm a small YouTuber who loves gaming and exploring new worlds.
    I enjoy creating chill and fun content, leveling up my skills,
    and sharing the journey with other gamers.
  </p>

  <a href="https://youtube.com/@bambuuspelar" target="_blank">YouTube</a>
  <a href="https://discord.com/users/1032996748798480525" target="_blank">Discord</a>

  <div class="currently-playing">
    <span class="label">🎮 Currently Playing</span>
    <span id="gameText">Roblox</span>
  </div>
</div>

<!-- VOLUME -->
<div id="volumeControl">
  🔊
  <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<script>
const overlay = document.getElementById("overlay");
const audio = document.getElementById("bgAudio");
const volumeSlider = document.getElementById("volumeSlider");

audio.volume = volumeSlider.value;

overlay.addEventListener("click", () => {
  audio.play().catch(err => console.log(err));
  overlay.classList.add("hidden");
  setTimeout(() => overlay.style.display = "none", 800);
});

volumeSlider.addEventListener("input", () => {
  audio.volume = volumeSlider.value;
});

/* CURRENTLY PLAYING ROTATION */
const games = [
  "Roblox",
  "Rainbow Six Siege",
  "Minecraft",
  "Euro Truck Simulator 2"
];

let index = 0;
const gameText = document.getElementById("gameText");

setInterval(() => {
  gameText.style.opacity = 0;
  setTimeout(() => {
    index = (index + 1) % games.length;
    gameText.textContent = games[index];
    gameText.style.opacity = 1;
  }, 400);
}, 2500);
</script>

</body>
</html>
