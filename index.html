<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>𝕭𝖆𝖒𝖇𝖚𝖚's Bio</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: url('background4.jpg') no-repeat center center / cover;
  overflow: hidden;
}

/* Overlay */
#overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  color: #fff;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 2rem;
  cursor: pointer;
  transition: opacity 0.8s ease;
  z-index: 1000;
}
#overlay.hidden { opacity: 0; pointer-events: none; }

/* Bio-card */
.bio-card {
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 30px;
  max-width: 400px;
  text-align: center;
  box-shadow: 0 0 20px rgba(0,0,0,0.5);
  transition: transform 0.3s, box-shadow 0.3s;
}
.bio-card:hover {
  transform: translateY(-10px) scale(1.02);
  box-shadow: 0 10px 30px rgba(0,0,0,0.7);
}

/* Avatar */
.avatar {
  width: 100px;
  height: 100px;
  border-radius: 50%;
  margin: 10px auto;
  object-fit: cover;
  border: 3px solid #fff;
  display: block;
}

/* 🔥 GLITCH NAME 🔥 */
#glitch {
  position: relative;
  color: #DE0000;
  font-size: 1.8em;
  text-shadow: 0 0 10px #DE0000;
}
#glitch::before,
#glitch::after {
  content: attr(data-text);
  position: absolute;
  left: 0;
  width: 100%;
  color: #ff0000;
  overflow: hidden;
}
#glitch::before {
  top: -2px;
  animation: glitchTop 2s infinite linear alternate-reverse;
}
#glitch::after {
  top: 2px;
  animation: glitchBottom 1.5s infinite linear alternate-reverse;
}

@keyframes glitchTop {
  0% { clip: rect(0,9999px,0,0); }
  20% { clip: rect(0,9999px,30px,0); }
  40% { clip: rect(10px,9999px,40px,0); }
}
@keyframes glitchBottom {
  0% { clip: rect(0,9999px,0,0); }
  20% { clip: rect(20px,9999px,60px,0); }
  40% { clip: rect(5px,9999px,25px,0); }
}

h3 { color: #ccc; }
p { color: #fff; }

a {
  display: inline-block;
  padding: 10px 20px;
  background: #ff4d4d;
  color: #fff;
  border-radius: 10px;
  text-decoration: none;
  margin: 5px;
}
a:hover { background: #ff1a1a; }

/* Currently Playing */
.currently-playing {
  margin-top: 15px;
  color: #FF0000;
  font-weight: bold;
}

/* Game icons */
.game-icons {
  margin-top: 10px;
  display: flex;
  justify-content: center;
  gap: 10px;
}
.game-icons img {
  width: 50px;
  height: 50px;
  border-radius: 10px;
  transition: 0.3s;
}
.game-icons img.highlight {
  transform: scale(1.2);
  box-shadow: 0 0 20px red;
}

/* Volume */
#volumeControl {
  position: fixed;
  bottom: 20px;
  right: 20px;
  color: #fff;
  z-index: 1001;
}

/* ✨ PARTICLES ✨ */
.particle {
  position: fixed;
  width: 6px;
  height: 6px;
  background: red;
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 10px red;
  animation: fade 0.6s linear forwards;
}
@keyframes fade {
  to {
    opacity: 0;
    transform: scale(2);
  }
}
</style>
</head>

<body>

<div id="overlay">Click to enter ▶</div>

<audio id="bgAudio" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div class="bio-card">
  <img src="avatar.png" class="avatar">
  <h1 id="glitch" data-text="Bambuu">Bambuu</h1>
  <h3>Gamer & YouTuber</h3>
  <p>Hey there! I'm a small YouTuber who loves gaming and exploring new worlds.</p>

  <a href="https://youtube.com/@bambuuspelar" target="_blank">YouTube</a>
  <a href="https://discord.com/users/1032996748798480525" target="_blank">Discord</a>

  <div class="currently-playing">
    🎮 Playing: <span id="gameText">Roblox</span>
  </div>

  <div class="game-icons">
    <img src="roblox1.jpg" data-game="Roblox">
    <img src="r6.jpg" data-game="R6 Siege">
    <img src="minecraft1.jpg" data-game="Minecraft">
    <img src="ets21.jpg" data-game="ETS2">
  </div>
</div>

<div id="volumeControl">
  🔊 <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.5">
</div>

<script>
const overlay = document.getElementById("overlay");
const audio = document.getElementById("bgAudio");
const volumeSlider = document.getElementById("volumeSlider");
const gameText = document.getElementById("gameText");
const icons = document.querySelectorAll(".game-icons img");

audio.volume = volumeSlider.value;

overlay.onclick = () => {
  audio.play();
  overlay.classList.add("hidden");
};

volumeSlider.oninput = () => audio.volume = volumeSlider.value;

const games = ["Roblox","R6 Siege","Minecraft","ETS2"];
let i = 0;
setInterval(() => {
  gameText.textContent = games[i];
  icons.forEach(img => img.classList.toggle("highlight", img.dataset.game === games[i]));
  i = (i+1)%games.length;
},3000);

/* ✨ particles after mouse */
document.addEventListener("mousemove", e => {
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = e.clientX + "px";
  p.style.top = e.clientY + "px";
  document.body.appendChild(p);
  setTimeout(() => p.remove(), 600);
});
</script>

</body>
</html>
